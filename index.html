<!DOCTYPE html>
<html lang="sl">

<head>

</head>


<body>


<header>

<h1>☕ Izčrpen kavni vodnik</h1>

<p>

njihovo definicijo, pripravo in izvor.
</p>

<div class="category-buttons">

<button onclick="filterCoffee('all')">Vsi</button>

<button onclick="filterCoffee('Načini priprave')">Načini priprave</button>

<button onclick="filterCoffee('Ledeno in hladno')">Ledeno in hladno</button>
<button onclick="filterCoffee('Sladice')">Sladice</button>

</div>



<h2 id="category-title">
Vsi kavni napitki
</h2>



<div id="coffee-container" class="coffee-grid">

</div>



<div id="coffee-detail">

</div>

<script src="script.js"></script>
