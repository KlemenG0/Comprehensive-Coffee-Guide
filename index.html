<!DOCTYPE html>
<html lang="sl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Izčrpen kavni vodnik</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>☕ Izčrpen kavni vodnik</h1>

<p>
To je izčrpen kavni vodnik, ki vključuje vse vrste kavnih napitkov,
njihovo definicijo, pripravo in izvor.
</p>

</header>



<div class="category-buttons">

<button onclick="filterCoffee('all')">Vsi</button>
<button onclick="filterCoffee('espresso')">Espresso</button>
<button onclick="filterCoffee('milk')">Espresso + mleko</button>
<button onclick="filterCoffee('methods')">Načini priprave</button>
<button onclick="filterCoffee('regional')">Regionalno</button>
<button onclick="filterCoffee('cold')">Ledeno in hladno</button>
<button onclick="filterCoffee('dessert')">Sladice</button>
<button onclick="filterCoffee('alcohol')">Z žganjem</button>

</div>



<h2 id="category-title">
Vsi kavni napitki
</h2>



<div id="coffee-container" class="coffee-grid">

</div>



<div id="coffee-detail">

</div>



<script src="coffee-data.js"></script>
<script src="script.js"></script>


</body>

</html>
